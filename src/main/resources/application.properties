spring.application.name=private-stock-monitoring

spring.datasource.url=jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:psmsdb}
spring.datasource.username=${DB_USERNAME:psmsapp}
spring.datasource.password=${DB_APP_PASSWD:psmsapp}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

kiwoom.app-key=${KIWOOM_APP_KEY:}
kiwoom.secret=${KIWOOM_SECRET:}
kiwoom.call-interval-ms=100
dashboard.base-url=${DASHBOARD_BASE_URL:http://localhost:8080}
telegram.bot-token=${TELEGRAM_BOT_TOKEN:}
telegram.chat-id=${TELEGRAM_CHAT_ID:}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Seoul
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.url=jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:psmsdb}
spring.flyway.user=${DB_ADM_USERNAME:psmsadm}
spring.flyway.password=${DB_ADM_PASSWD:psmsadm}

server.forward-headers-strategy=framework

