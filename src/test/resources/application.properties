spring.datasource.url=jdbc:h2:mem:psms;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.url=jdbc:h2:mem:psms;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.flyway.user=sa
spring.flyway.password=

kiwoom.app-key=${KIWOOM_APP_KEY:}
kiwoom.secret=${KIWOOM_SECRET:}

dashboard.base-url=http://localhost:8080

telegram.bot-token=test-token
telegram.chat-id=test-chat-id
