name: Build & Push Docker Images

on:
  push:
    branches:
      - auto-build
  workflow_dispatch:
    inputs:
      target:
        description: '빌드 대상'
        required: true
        default: 'app'
        type: choice
        options:
          - app
          - nginx
          - all

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push app image (psms)
        if: github.event_name == 'push' || inputs.target == 'app' || inputs.target == 'all'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/fwangchanju/psms:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push nginx image (psms-nginx)
        if: github.event_name == 'push' || inputs.target == 'nginx' || inputs.target == 'all'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/nginx/Dockerfile
          push: true
          tags: ghcr.io/fwangchanju/psms-nginx:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
