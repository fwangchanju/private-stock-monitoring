name: Build & Push Docker Images

on:
  push:
    branches:
      - auto-build
  workflow_dispatch:
    inputs:
      target:
        description: '빌드 대상'
        required: true
        default: 'app'
        type: choice
        options:
          - app
          - front
          - renderer
          - all

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push app image (psms)
        if: github.event_name == 'push' || inputs.target == 'app' || inputs.target == 'all'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/fwangchanju/psms:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push front image (psms-nginx)
        if: github.event_name == 'push' || inputs.target == 'front' || inputs.target == 'all'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/front/Dockerfile
          push: true
          tags: ghcr.io/fwangchanju/psms-nginx:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push renderer image (psms-renderer)
        if: github.event_name == 'push' || inputs.target == 'renderer' || inputs.target == 'all'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/renderer/Dockerfile
          push: true
          tags: ghcr.io/fwangchanju/psms-renderer:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        env:
          CR_PAT: ${{ secrets.CR_PAT }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: CR_PAT
          script: |
            DEPLOY_DIR=~/app/private-stock-monitoring/deploy
            TARGET="${{ inputs.target }}"
            EVENT="${{ github.event_name }}"

            if [ "$EVENT" = "push" ] || [ "$TARGET" = "all" ]; then
              bash "$DEPLOY_DIR/deploy.sh"
            elif [ "$TARGET" = "app" ]; then
              bash "$DEPLOY_DIR/deploy-app.sh"
            elif [ "$TARGET" = "front" ]; then
              bash "$DEPLOY_DIR/deploy-front.sh"
            elif [ "$TARGET" = "renderer" ]; then
              bash "$DEPLOY_DIR/deploy-renderer.sh"
            fi
